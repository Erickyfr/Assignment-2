<!DOCTYPE html>
<html>
    <head>
        <title> Assignment 2 Flights Page </title>
    

      <link rel="stylesheet" href="mystyle.css">
      <script src="main.js" defer></script>
    </head>

    <body>
        <header>
            <span id="datetime-display"></span>
        </header>

        <nav>
            <a href="index.html">Home</a>
            <a href="stays.html">Stays</a>
            <a href="flights.html">Flights</a>
            <a href="cars.html">Cars</a>
            <a href="cruises.html">Cruises</a>
            <a href="contacts.html">Contact Us</a>
        </nav>

        <div id ="content-wrapper">
            <aside>

            </aside>

            <main>

                <form id="flight-form" onsubmit="return validateFlightForm()">
                    <!-- trip type radio buttons -->

                    <label> Trip Type</label><br>

                     <input type="radio" id="one-way-trip" value="one-way" name="Trip" onclick="hideReturnDate()">
                     <label for="one-way-trip"> One-Way </label><br>
                      
                     <input type="radio" id="round-trip" value="round-trip" name="Trip" onclick="showReturnDate()">
                     <label for="round-trip"> Round-Trip </label><br>
                    <br><br>
                    <!-- origin input -->
                     <label> Flight Info </label><br>

                     <label for="origin"> Origin </label>
                     <input type="text" id="origin"> <br>


                    <!-- destination input -->
                    <label for="destination"> Destination </label>
                    <input type="text" id="destination"> <br>


                    <!-- departure date input -->
                     <label for="departure-date"> Departure Date </label>
                     <input type="date" id="departure-date"> <br>


                    <!-- return date input -->
                     <div id="return-date-section">
                        <label for="return-date"> Return Date</label>
                        <input type="date" id="return-date">
                     </div>
                     <br><br>

                    <!-- passenger icon/button -->
                     <button type="button" id="passenger-button" onclick="showPassengerSection()"> 
                        <img src="person-fill.svg" alt="Passenger icon" width="20">
                        Passengers </button>

                     <div id="passenger-section">
                        <label for="adult-passenger"> Adult </label>
                        <input type="number" id="adult-passenger" value="0"> <br>

                        <label for="children-passenger"> Children </label>
                        <input type="number" id="children-passenger" value="0"> <br>

                        <label for="infant-passenger"> Infant </label>
                        <input type="number" id="infant-passenger" value="0">
                     </div>
                     <br><br>
                    <!-- passenger form -->

                    <!-- search button -->
                     <button type="submit"> Search </button>
                </form>

                <div id="error-message"></div>
                <div id="result"></div>

            </main>
        </div>

        <footer>
            <p><b><i> Created by </i></b></p>
        </footer>
    </body>
</html>
