<!DOCTYPE html>
<html>
    <head>
        <title> Assignment 2 Cruises Page </title>
    

      <link rel="stylesheet" href="mystyle.css">
      <script src="main.js" defer></script>
      <script src="jquery.min.js" defer></script>
      <script src="cruises.js" defer></script>
    </head>

    <body>
        <header>
            <span id="datetime-display"></span>
        </header>

        <nav>
            <a href="index.html">Home</a>
            <a href="stays.html">Stays</a>
            <a href="flights.html">Flights</a>
            <a href="cars.html">Cars</a>
            <a href="cruises.html">Cruises</a>
            <a href="contacts.html">Contact Us</a>
        </nav>

        <div id ="content-wrapper">
            <aside>
                <div>
                    <label> Font Size: </label>
                    <input type="number" value = "25" min="12" max="32" id="font-size-input">
                    <button onclick="fontSizeChange()"> apply </button>

                </div>

                <div>
                    <label> Background Color: </label>
                    <input type="color" id="background-color-input">
                    <button onclick="backgroundColorChange()"> apply </button>
                </div>
            </aside>

            <main>

                <form id="cruise-form">

                    <!-- destination drop down -->
                    <label for="cruise-destination"> Destination </label>
                    <select id="cruise-destination">
                        <option value=""> Select a destination </option>
                        <option value="Alaska"> Alaska </option>
                        <option value="Bahamas"> Bahamas </option>
                        <option value="Europe"> Europe </option>
                        <option value="Mexico"> Mexico </option>
                    </select>
                    <br><br>

                    <!-- departing between two dates -->
                    <label> Departing Between </label> <br>

                    <label for="depart-start"> From </label>
                    <input type="date" id="depart-start"> <br>

                    <label for="depart-end"> To </label>
                    <input type="date" id="depart-end">
                    <br><br>

                    <!-- duration of cruise -->
                    <label> Duration (days) </label> <br>

                    <label for="duration-min"> Minimum </label>
                    <input type="number" id="duration-min" value="3"> <br>

                    <label for="duration-max"> Maximum </label>
                    <input type="number" id="duration-max" value="10">
                    <br><br>

                    <!-- guests per category -->
                    <label> Guests </label> <br>

                    <label for="cruise-adult"> Adult </label>
                    <input type="number" id="cruise-adult" value="0"> <br>

                    <label for="cruise-children"> Children </label>
                    <input type="number" id="cruise-children" value="0"> <br>

                    <label for="cruise-infant"> Infant </label>
                    <input type="number" id="cruise-infant" value="0">
                    <br><br>

                    <!-- submit button -->
                    <button type="submit"> Submit </button>
                </form>

                <div id="error-message"></div>
                <div id="result"></div>

            </main>
        </div>

        <footer>
            <p><b><i> Created By: <br> Ewere E Ikaria & Syed F Hossan </i></b></p>
        </footer>
    </body>
</html>
